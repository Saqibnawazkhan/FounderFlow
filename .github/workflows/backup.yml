##
## Tier 3 nightly backup — pg_dump the production database to an S3-shaped
## bucket every night at 04:15 UTC.
##
## Setup (one-time, in the repo's GitHub Settings → Secrets and variables):
##   BACKUP_DATABASE_URL   Supabase SESSION-pooler URL (port 5432, user
##                         `postgres.<project-ref>`). The dump step rewrites
##                         it to the transaction pooler (6543 +
##                         `options=reference`) because that's the only
##                         pg_dump-compatible path from an IPv4-only GHA
##                         runner — direct connection is IPv6-only, session
##                         pooler rejects pg_dump. Do NOT paste the
##                         "Direct connection" string; the rewrite expects
##                         the `postgres.<ref>` session-pooler shape.
##   BACKUP_S3_BUCKET      target bucket, e.g. `founderflow-backups`. Works
##                         with R2, S3, Backblaze B2 — anything that speaks
##                         the S3 API.
##   BACKUP_S3_REGION      e.g. `auto` (R2), `us-east-1` (S3).
##   BACKUP_S3_ACCESS_KEY  access-key id.
##   BACKUP_S3_SECRET_KEY  secret access key.
##   BACKUP_S3_ENDPOINT    (optional) custom S3 endpoint. Leave blank for AWS.
##                         Example for R2:
##                         https://<account>.r2.cloudflarestorage.com
##
## Retention: adjust the bucket's lifecycle policy at the bucket side, not
## here — S3-standard lifecycle rules give you the same 90-day sliding window
## the app-side purge cron uses, and they clean up dumps this workflow won't
## re-touch after upload.
##
## Restoring: fetch the dump from S3, run
##   gunzip -c founderflow-YYYY-MM-DD.sql.gz | psql "$RESTORE_DATABASE_URL"
## There is deliberately no automated restore workflow — that's the kind of
## "one wrong click nukes a customer's data" button we do not need.
##

name: Nightly database backup

on:
  schedule:
    # 04:15 UTC daily. Runs an hour after the purge cron so the dump captures
    # today's post-purge state — the tombstoned rows past 90 days are gone
    # by the time we snapshot.
    - cron: "15 4 * * *"
  workflow_dispatch:
    # Manual "back it up now" button in the Actions tab. Useful before a
    # scary migration or a schema-change deploy.

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install Postgres 17 client
        run: |
          # awscli v2 is pre-installed on ubuntu-latest runners, so we only
          # need pg_dump here. Ubuntu 24.04 ships client 16 by default, but
          # Supabase runs Postgres 17.6 as of 2026-07-04 and pg_dump refuses
          # to dump from a newer server — add PGDG's apt source to get 17.
          # If Supabase upgrades again, bump the version number in three
          # places here (pg key install is version-agnostic).
          sudo apt-get install -y --no-install-recommends curl ca-certificates lsb-release
          curl -fsS https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo tee /etc/apt/trusted.gpg.d/postgresql.asc > /dev/null
          echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client-17
          # `pg_dump` on PATH goes through Debian's pg_wrapper, which picks
          # the highest installed version — but the ubuntu-latest image can
          # already ship a client-16 binary at higher alternatives priority,
          # so we saw pg_dump 16 running even after client-17 installed.
          # Print both to make the mismatch loud, and export the explicit
          # path so the dump step never resolves ambiguously.
          echo "which pg_dump: $(which pg_dump)"
          echo "wrapper reports: $(pg_dump --version)"
          echo "17 binary reports: $(/usr/lib/postgresql/17/bin/pg_dump --version)"
          echo "PG_DUMP=/usr/lib/postgresql/17/bin/pg_dump" >> "$GITHUB_ENV"
          aws --version

      - name: Compute filename
        id: filename
        run: |
          echo "path=founderflow-$(date -u +%Y-%m-%d).sql.gz" >> "$GITHUB_OUTPUT"

      - name: Dump database
        env:
          BACKUP_DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
        run: |
          # set -e alone doesn't catch failures on the LEFT side of a pipe;
          # pipefail promotes them so a pg_dump error kills the step even
          # though `gzip` writes a (near-empty) file downstream. Without
          # this, a broken dump silently uploads a 20-byte gzip header to
          # R2 and the workflow shows green — the exact false-positive that
          # burned us on 2026-07-03.
          set -euo pipefail

          # Supabase's connection story is a maze that needs walking:
          #   - Direct connection (db.<ref>.supabase.co:5432): IPv6-only on
          #     newer projects → GHA runners are IPv4-only → not reachable.
          #   - Session pooler (aws-*.pooler.supabase.com:5432): Supavisor,
          #     user format `postgres.<ref>`. Rejects pg_dump with "database
          #     postgres does not exist" (Supavisor doesn't like pg_dump's
          #     startup message).
          #   - Transaction pooler (aws-*.pooler.supabase.com:6543):
          #     classic pgbouncer. Routes by `options=reference=<ref>` and
          #     wants the user to be plain `postgres`, NOT `postgres.<ref>`
          #     — passing the dotted form makes the underlying auth_query
          #     return zero rows → EAUTHQUERY.
          #
          # We store the URL as the session pooler variant so it can double
          # as a migration URL if we ever need it, and rewrite it here for
          # pg_dump: strip `.<ref>` from the user, swap 5432 → 6543, append
          # options=reference.
          PROJECT_REF="$(printf '%s' "$BACKUP_DATABASE_URL" | sed -nE 's|.*://postgres\.([^:]+):.*|\1|p')"
          if [ -z "$PROJECT_REF" ]; then
            echo "::error::Could not extract Supabase project ref from BACKUP_DATABASE_URL. Expected user part 'postgres.<project-ref>'." >&2
            exit 1
          fi
          PGDUMP_URL="$(printf '%s' "$BACKUP_DATABASE_URL" \
            | sed -E "s|://postgres\\.${PROJECT_REF}:|://postgres:|" \
            | sed -E 's|:5432/postgres([?].*)?$|:6543/postgres|')?options=reference%3D${PROJECT_REF}"

          # --no-owner / --no-privileges keep the dump portable across
          # Supabase projects, so a restore into a fresh project (staging,
          # dev) isn't blocked by permission grants. $PG_DUMP is exported
          # by the install step above and points at the versioned 17 binary
          # so pg_wrapper's version pick never rides. Do NOT add -j (parallel):
          # snapshot sharing across pgbouncer-scattered worker backends
          # breaks a transaction-pooler dump. Single-connection only.
          #
          # Dump to a PLAIN file first (no pipe), then validate, then gzip.
          # Piping straight into gzip means `set -e` can't see a pg_dump
          # failure without pipefail gymnastics, and — more importantly —
          # a gzip'd stream can't be content-checked before upload. Writing
          # the raw .sql lets us assert the dump actually contains data.
          RAW="${{ steps.filename.outputs.path }}.raw.sql"
          "$PG_DUMP" "$PGDUMP_URL" \
            --no-owner \
            --no-privileges \
            --format=plain \
            > "$RAW"

          # ── Content validation ────────────────────────────────────────
          # The old check was byte-size only. A size floor proves the file
          # is non-empty; it does NOT prove the dump contains our data. A
          # schema-only dump, or one that lost rows mid-COPY but still exited
          # 0, would sail past a size gate. That's the same class of
          # "green but wrong" that burned us on 2026-07-03 — so assert
          # actual content: core-table DDL, a COPY data block, and a
          # plausible table count. Any failure aborts before upload.
          if ! grep -qE 'CREATE TABLE (public\.)?"?User"?' "$RAW"; then
            echo "::error::Dump is missing the User table DDL — refusing to upload a broken backup." >&2
            exit 1
          fi
          # plain-format pg_dump emits data as COPY (not INSERT, since we
          # don't pass --inserts). A dump with schema but zero data would
          # miss this — catches the schema-only failure mode.
          if ! grep -qE 'COPY (public\.)?"?User"? ' "$RAW"; then
            echo "::error::Dump has no COPY data block for User — likely schema-only or data lost mid-dump. Refusing to upload." >&2
            exit 1
          fi
          table_count=$(grep -cE '^CREATE TABLE ' "$RAW" || true)
          if [ "${table_count:-0}" -lt 12 ]; then
            echo "::error::Dump has only ${table_count} CREATE TABLE statements, expected >= 12 app tables. Refusing to upload." >&2
            exit 1
          fi

          gzip -9 -c "$RAW" > "${{ steps.filename.outputs.path }}"
          rm -f "$RAW"

          # Final belt: a real gzipped dump of this schema is tens of KB.
          file_size=$(stat -c%s "${{ steps.filename.outputs.path }}")
          if [ "$file_size" -lt 512 ]; then
            echo "::error::Gzipped dump is only ${file_size} bytes — refusing to upload." >&2
            exit 1
          fi
          ls -lh "${{ steps.filename.outputs.path }}"
          echo "Content check passed: ${table_count} tables, User DDL + COPY data present. Gzip size: ${file_size} bytes"

      - name: Upload to S3-compatible bucket
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.BACKUP_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.BACKUP_S3_SECRET_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.BACKUP_S3_REGION }}
          BACKUP_S3_BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
          BACKUP_S3_ENDPOINT: ${{ secrets.BACKUP_S3_ENDPOINT }}
        run: |
          # --endpoint-url is optional; awscli accepts an empty flag gracefully
          # if we don't pass it, so branch on whether BACKUP_S3_ENDPOINT is set.
          if [ -n "$BACKUP_S3_ENDPOINT" ]; then
            aws s3 cp "${{ steps.filename.outputs.path }}" \
              "s3://$BACKUP_S3_BUCKET/nightly/${{ steps.filename.outputs.path }}" \
              --endpoint-url "$BACKUP_S3_ENDPOINT"
          else
            aws s3 cp "${{ steps.filename.outputs.path }}" \
              "s3://$BACKUP_S3_BUCKET/nightly/${{ steps.filename.outputs.path }}"
          fi
