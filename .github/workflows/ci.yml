name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # `npm install` (not `npm ci`) tolerates the known npm bug where
      # optional + cpu-mismatched packages (e.g. @rolldown/binding-wasm32-wasi)
      # reference transitive deps like @emnapi/core@1.10.0 but the lock file
      # omits the corresponding package entry — `npm ci` fails strict
      # validation, `npm install` reconciles silently. `--no-audit --no-fund`
      # keeps the log clean.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: http://localhost:3000
