name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # `npm install` (not `npm ci`) tolerates the known npm bug where
      # optional + cpu-mismatched packages (e.g. @rolldown/binding-wasm32-wasi)
      # reference transitive deps like @emnapi/core@1.10.0 but the lock file
      # omits the corresponding package entry — `npm ci` fails strict
      # validation, `npm install` reconciles silently. `--no-audit --no-fund`
      # keeps the log clean.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      # Static checks that don't need a DB connection but catch the class
      # of bug that took the site down on 2026-07-03:
      #   `prisma validate` fails if schema.prisma is malformed or the
      #     migrations directory is inconsistent with the schema.
      #   `prisma format --check` fails if someone hand-edited the schema
      #     without formatting.
      # The real guardrail is scripts/vercel-build.mjs which runs
      # `prisma migrate deploy` during the actual production build; this
      # is just an earlier signal.
      - name: Prisma schema check
        run: |
          npx prisma validate
          npx prisma format --check

      - name: Type check
        run: npm run typecheck

      # The unit suite is all pure-function / jsdom — no DB needed. Without
      # this step a regression in a tested schema/parser/permission helper
      # could merge to main green, which is exactly what CLAUDE.md's
      # "Verification before pushing" list (typecheck && test && build) is
      # meant to prevent.
      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: http://localhost:3000
